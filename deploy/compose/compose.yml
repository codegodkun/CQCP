services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${CQCP_DB_NAME:-cqcp}
      POSTGRES_USER: ${CQCP_DB_USERNAME:-cqcp}
      POSTGRES_PASSWORD: ${CQCP_DB_PASSWORD:-cqcp}
    ports:
      - "${CQCP_DB_PORT:-54329}:5432"
    volumes:
      - cqcp_postgres_data:/var/lib/postgresql/data

  api-server:
    build:
      context: ../../apps/api-server
    environment:
      CQCP_DB_URL: jdbc:postgresql://postgres:5432/${CQCP_DB_NAME:-cqcp}
      CQCP_DB_USERNAME: ${CQCP_DB_USERNAME:-cqcp}
      CQCP_DB_PASSWORD: ${CQCP_DB_PASSWORD:-cqcp}
    ports:
      - "${CQCP_API_PORT:-18080}:8080"
    depends_on:
      - postgres

  admin-web:
    build:
      context: ../../apps/admin-web
    environment:
      API_UPSTREAM: http://api-server:8080
    ports:
      - "${CQCP_WEB_PORT:-15173}:80"
    depends_on:
      - api-server

volumes:
  cqcp_postgres_data:
    name: cqcp_postgres_data
