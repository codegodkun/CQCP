openapi: 3.1.0
info:
  title: CQCP Minimal Review API Contract
  version: 0.1.0
  description: >-
    TASK-014 冻结的最小公开 API 契约，只覆盖任务创建、执行状态查询和普通结果读取。
servers:
  - url: /
paths:
  /api/review/tasks:
    post:
      summary: 创建审核任务
      description: >-
        外部系统或管理台通过同一入口创建审核任务。MVP 只接受 DOCX，
        外部 API 不允许调用方指定 modelProfileCode。
      operationId: createReviewTask
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required:
                - file
                - metadata
              properties:
                file:
                  type: string
                  format: binary
                  description: 仅支持 `.docx` 文件。
                metadata:
                  $ref: '#/components/schemas/CreateReviewTaskMetadata'
            encoding:
              metadata:
                contentType: application/json
      responses:
        '202':
          description: 已接受任务并创建首个 execution。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReviewTaskResponse'
        '400':
          description: 字段或文件校验失败。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '409':
          description: 当前规则集或任务状态不允许创建。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessErrorResponse'
        '429':
          description: 队列或系统容量不足。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessErrorResponse'
  /api/review/tasks/{taskId}/executions/{executionId}:
    get:
      summary: 查询 execution 状态
      description: >-
        用于异步轮询状态。公开顶层状态只暴露有限集合，
        reviewModel 只返回执行绑定后的摘要。
      operationId: getReviewExecutionStatus
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - name: executionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: execution 状态。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewExecutionStatusResponse'
        '404':
          description: task 或 execution 不存在。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessErrorResponse'
  /api/v1/tasks/{taskId}/result:
    get:
      summary: 读取任务结果快照
      description: >-
        返回当前 task 最新结果快照。当前真实实现直接返回 `ReviewResultSnapshot`，
        不再返回旧的 `SNAPSHOT / PENDING / FAILED` 视图包装模型。
        `notConcludedDetail` 与 `missingOptionalSlots[]` 在本契约中仅作为
        optional compatibility / diagnostic-only 字段预留，当前真实 DTO 可能尚未承载。
      operationId: getTaskResultSnapshot
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务结果快照。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResultSnapshot'
        '404':
          description: task 不存在或尚无可读取结果。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessErrorResponse'
components:
  schemas:
    CreateReviewTaskMetadata:
      type: object
      additionalProperties: false
      required:
        - contractType
        - structuredFields
      properties:
        businessDocumentId:
          type: string
          description: 外部系统业务单据号；平台透传并保存为任务元数据。
        contractType:
          $ref: '#/components/schemas/ContractType'
        structuredFields:
          $ref: '#/components/schemas/StructuredFieldsInput'
    CreateReviewTaskResponse:
      type: object
      additionalProperties: false
      required:
        - taskId
        - executionId
        - status
        - resultUrl
      properties:
        taskId:
          type: string
        executionId:
          type: string
        status:
          $ref: '#/components/schemas/PublicTaskStatus'
        resultUrl:
          type: string
          description: 普通结果页 URL。
          example: /review/results/TASK_2026_0001?executionId=EXEC_2026_0001_001
    ReviewExecutionStatusResponse:
      type: object
      additionalProperties: false
      required:
        - taskId
        - executionId
        - status
        - terminal
        - resultUrl
        - snapshotAvailable
        - reviewModel
        - createdAt
        - updatedAt
      properties:
        taskId:
          type: string
        executionId:
          type: string
        status:
          $ref: '#/components/schemas/PublicTaskStatus'
        currentStage:
          $ref: '#/components/schemas/ExecutionStage'
        terminal:
          type: boolean
        snapshotAvailable:
          type: boolean
        resultUrl:
          type: string
        reviewModel:
          $ref: '#/components/schemas/ReviewModelSummary'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        superseded:
          type: boolean
          default: false
        supersededReason:
          $ref: '#/components/schemas/SupersededReason'
    ReviewResultSnapshot:
      type: object
      additionalProperties: false
      required:
        - taskId
        - executionId
        - status
        - summary
        - reviewCompleteness
        - pointResults
        - findings
        - diagnostics
        - sourceAnchors
        - structuredFieldsSnapshot
        - enabledReviewPointsSnapshot
        - disabledReviewPointsSnapshot
        - contractTypeProfileVersion
        - ruleSetVersion
        - reviewBudgetProfileVersion
        - modelProfileVersion
        - parserVersion
        - promptVersion
        - schemaVersion
        - patternLibraryVersion
        - fieldLexiconVersion
        - evidenceSelectorVersion
        - createdAt
      properties:
        taskId:
          type: string
        executionId:
          type: string
        supersededByExecutionId:
          type: string
        supersededReason:
          $ref: '#/components/schemas/SupersededReason'
        status:
          $ref: '#/components/schemas/SnapshotStatus'
        summary:
          $ref: '#/components/schemas/ReviewResultSummary'
        reviewCompleteness:
          $ref: '#/components/schemas/ReviewCompleteness'
        pointResults:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PointResult'
        findings:
          type: array
          items:
            $ref: '#/components/schemas/ReviewFinding'
        diagnostics:
          type: array
          items:
            $ref: '#/components/schemas/PointDiagnostic'
        sourceAnchors:
          type: array
          items:
            $ref: '#/components/schemas/SourceAnchorSummary'
        structuredFieldsSnapshot:
          type: object
          description: 当前真实实现中的结构化字段快照；值统一序列化为字符串。
          additionalProperties:
            type: string
        enabledReviewPointsSnapshot:
          type: array
          items:
            $ref: '#/components/schemas/ReviewPointSnapshot'
        disabledReviewPointsSnapshot:
          type: array
          items:
            $ref: '#/components/schemas/ReviewPointSnapshot'
        contractTypeProfileVersion:
          type: string
        ruleSetVersion:
          type: string
        reviewBudgetProfileVersion:
          type: string
        modelProfileVersion:
          type: string
        parserVersion:
          type: string
        promptVersion:
          type: string
        schemaVersion:
          type: string
        patternLibraryVersion:
          type: string
        fieldLexiconVersion:
          type: string
        evidenceSelectorVersion:
          type: string
        createdAt:
          type: string
          format: date-time
    ReviewResultSummary:
      type: object
      additionalProperties: false
      required:
        - plannedPointCount
        - passCount
        - errorCount
        - warningCount
        - notConcludedCount
        - skippedCount
      properties:
        plannedPointCount:
          type: integer
          minimum: 0
        passCount:
          type: integer
          minimum: 0
        errorCount:
          type: integer
          minimum: 0
        warningCount:
          type: integer
          minimum: 0
        notConcludedCount:
          type: integer
          minimum: 0
        skippedCount:
          type: integer
          minimum: 0
    ReviewCompleteness:
      type: object
      additionalProperties: false
      required:
        - reviewCoverageStatus
        - executablePointCount
        - concludedPointCount
        - notConcludedPointCount
        - concludedCoverageRate
        - confidenceLevel
      properties:
        reviewCoverageStatus:
          $ref: '#/components/schemas/ReviewCoverageStatus'
        executablePointCount:
          type: integer
          minimum: 0
        concludedPointCount:
          type: integer
          minimum: 0
        notConcludedPointCount:
          type: integer
          minimum: 0
        concludedCoverageRate:
          type: number
          minimum: 0
          maximum: 100
        confidenceLevel:
          $ref: '#/components/schemas/ConfidenceLevel'
    PointResult:
      type: object
      additionalProperties: false
      required:
        - reviewPointCode
        - pointStatus
        - businessMessage
        - sourceAnchors
      properties:
        reviewPointCode:
          type: string
        pointStatus:
          $ref: '#/components/schemas/PointStatus'
        businessMessage:
          type: string
        findingSeverity:
          $ref: '#/components/schemas/FindingSeverity'
        sourceAnchors:
          type: array
          items:
            $ref: '#/components/schemas/SourceAnchorSummary'
        notConcludedReason:
          $ref: '#/components/schemas/NotConcludedReason'
        notConcludedDetail:
          $ref: '#/components/schemas/NotConcludedDetail'
          description: >-
            optional / diagnostic-only compatibility field。当前真实 DTO 可能尚未承载；
            仅在后续兼容演进时返回，用于补充 NOT_CONCLUDED 的更细粒度诊断语义。
        skippedReason:
          type: string
        missingOptionalSlots:
          type: array
          description: >-
            optional compatibility field。当前真实 DTO 可能尚未承载；
            用于表达 optional evidence slot 的缺口，不改变既有 PointStatus 或
            notConcludedReason 的稳定语义。
          items:
            $ref: '#/components/schemas/MissingOptionalSlot'
    ReviewFinding:
      type: object
      additionalProperties: false
      required:
        - reviewPointCode
        - severity
        - businessMessage
        - sourceAnchors
      properties:
        reviewPointCode:
          type: string
        severity:
          $ref: '#/components/schemas/FindingSeverity'
        businessMessage:
          type: string
        sourceAnchors:
          type: array
          items:
            $ref: '#/components/schemas/SourceAnchorSummary'
    PointDiagnostic:
      type: object
      additionalProperties: false
      required:
        - reviewPointCode
        - pointStatus
        - diagnosticCode
        - businessReason
        - evidenceBlockIds
        - evidenceSummary
        - containsSensitivePayload
      properties:
        reviewPointCode:
          type: string
        pointStatus:
          type: string
        diagnosticCode:
          type: string
        businessReason:
          type: string
        evidenceBlockIds:
          type: array
          items:
            type: string
        evidenceSummary:
          type: string
        containsSensitivePayload:
          type: boolean
    SourceAnchorSummary:
      type: object
      additionalProperties: false
      required:
        - blockId
        - sourceOrigin
        - sourceExtractionMode
        - contextType
        - evidenceSummary
      properties:
        blockId:
          type: string
        sourceOrigin:
          type: string
          description: 当前最小稳定字段；值集合以后端实际实现为准。
        sourceExtractionMode:
          type: string
          description: 当前最小稳定字段；值集合以后端实际实现为准。
        contextType:
          type: string
          description: 当前最小稳定字段；值集合以后端实际实现为准。
        evidenceSummary:
          type: string
        relatedBlockIds:
          type: array
          description: optional compatibility field。ADR-015 后续正式化预留字段，当前可能缺失。
          items:
            type: string
        sectionPath:
          type: array
          description: optional compatibility field。当前真实结构可能缺失。
          items:
            type: string
        locationLevel:
          type: string
          description: optional compatibility field / stabilization field。当前真实结构可能缺失。
          enum:
            - EXACT_TEXT_RANGE
            - BLOCK_LEVEL
            - PAGE_LEVEL
            - SECTION_LEVEL
            - UNAVAILABLE
        regionType:
          type: string
          description: optional compatibility field。当前真实结构可能缺失。
        previewPage:
          type: integer
          minimum: 1
          description: optional compatibility field。当前真实结构可能缺失。
        previewElementRef:
          type: string
          description: optional compatibility field。当前真实结构可能缺失。
        confidence:
          type: string
          description: optional compatibility field。当前真实结构可能缺失。
        failureReason:
          type: string
          description: optional compatibility field。当前真实结构可能缺失。
    MissingOptionalSlot:
      type: object
      additionalProperties: false
      required:
        - slotName
        - cause
      properties:
        slotName:
          type: string
        cause:
          type: string
          description: compatibility field。当前用于承载 optional slot 缺口原因，不改变点级状态语义。
        contributingCauses:
          type: array
          items:
            type: string
        businessMessage:
          type: string
          description: optional compatibility field。用于结果页或诊断展示的业务化提示。
    ReviewPointSnapshot:
      type: object
      additionalProperties: false
      required:
        - reviewPointCode
        - displayCode
        - displayName
        - reviewPointFamily
        - contractType
        - defaultSeverity
        - displayOrder
      properties:
        reviewPointCode:
          type: string
        displayCode:
          type: string
        displayName:
          type: string
        reviewPointFamily:
          type: string
        contractType:
          type: string
        defaultSeverity:
          $ref: '#/components/schemas/FindingSeverity'
        displayOrder:
          type: integer
          minimum: 0
    DefinitionTermIndexEntry:
      type: object
      additionalProperties: false
      description: >-
        已冻结的 DefinitionTermIndex 最小接口表示。本版不挂到公开 path，
        仅作为未来内部诊断/调优接口复用的 schema 基线。
      required:
        - definitionId
        - term
        - normalizedTerm
        - definitionText
        - sourceAnchor
        - applicableScope
        - confidenceLevel
        - conflictsWith
        - patternVersion
      properties:
        definitionId:
          type: string
        term:
          type: string
        normalizedTerm:
          type: string
        definitionText:
          type: string
        sourceAnchor:
          $ref: '#/components/schemas/SourceAnchorSummary'
        applicableScope:
          type: string
          enum:
            - GLOBAL
            - SECTION
            - APPENDIX
            - TABLE
        scopeReference:
          type: string
        confidenceLevel:
          $ref: '#/components/schemas/ConfidenceLevel'
        conflictsWith:
          type: array
          items:
            type: string
        patternVersion:
          type: string
    ReviewModelSummary:
      type: object
      additionalProperties: false
      required:
        - modelProfileCode
        - providerType
        - modelName
        - endpointAlias
        - modelConfigVersion
      properties:
        modelProfileCode:
          type: string
        providerType:
          $ref: '#/components/schemas/ProviderType'
        modelName:
          type: string
        endpointAlias:
          type: string
        modelConfigVersion:
          type: string
    StructuredFieldsInput:
      oneOf:
        - $ref: '#/components/schemas/MonthlyStructuredFields'
        - $ref: '#/components/schemas/MilestoneStructuredFields'
    BaseStructuredFields:
      type: object
      additionalProperties: false
      required:
        - contractName
        - partyAName
        - partyBName
        - projectName
        - contractTotalAmount
        - taxExcludedAmount
        - taxAmount
        - taxRate
        - pricingMode
        - paymentMethod
        - invoiceType
      properties:
        contractName:
          type: string
        partyAName:
          type: string
        partyBName:
          type: string
        projectName:
          type: string
        contractTotalAmount:
          type: number
          multipleOf: 0.01
          description: 合同总金额（含税）。
        taxExcludedAmount:
          type: number
          multipleOf: 0.01
        taxAmount:
          type: number
          multipleOf: 0.01
        taxRate:
          type: number
          minimum: 0
          maximum: 100
          multipleOf: 0.0001
          description: 使用百分比数值语义；`13` 表示 `13%`。
        pricingMode:
          $ref: '#/components/schemas/PricingMode'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        invoiceType:
          $ref: '#/components/schemas/InvoiceType'
        currency:
          type: string
          enum:
            - CNY
          default: CNY
    MonthlyStructuredFields:
      allOf:
        - $ref: '#/components/schemas/BaseStructuredFields'
        - type: object
          required:
            - paymentMethod
            - prepaymentRatio
            - progressPaymentRatio
            - completionPaymentRatio
            - settlementPaymentRatio
            - warrantyRetentionRatio
          properties:
            paymentMethod:
              type: string
              enum:
                - MONTHLY
            prepaymentRatio:
              type: number
              minimum: 0
              maximum: 100
              multipleOf: 0.01
            progressPaymentRatio:
              type: number
              minimum: 0
              maximum: 100
              multipleOf: 0.01
            completionPaymentRatio:
              type: number
              minimum: 0
              maximum: 100
              multipleOf: 0.01
            settlementPaymentRatio:
              type: number
              minimum: 0
              maximum: 100
              multipleOf: 0.01
            warrantyRetentionRatio:
              type: number
              minimum: 0
              maximum: 100
              multipleOf: 0.01
    MilestoneStructuredFields:
      allOf:
        - $ref: '#/components/schemas/BaseStructuredFields'
        - type: object
          required:
            - paymentMethod
            - prepaymentRatio
            - milestonePaymentTerms
          properties:
            paymentMethod:
              type: string
              enum:
                - MILESTONE
            prepaymentRatio:
              type: number
              minimum: 0
              maximum: 100
              multipleOf: 0.01
            milestonePaymentTerms:
              type: string
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - fieldErrors
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
        message:
          type: string
        fieldErrors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FieldValidationError'
    FieldValidationError:
      type: object
      additionalProperties: false
      required:
        - field
        - code
        - message
      properties:
        field:
          type: string
        code:
          type: string
          enum:
            - REQUIRED_FIELD_MISSING
            - CONDITIONAL_FIELD_MISSING
            - INVALID_ENUM_VALUE
            - INVALID_DECIMAL_SCALE
            - INVALID_PERCENT_RANGE
            - UNSUPPORTED_CURRENCY
            - UNSUPPORTED_FILE_TYPE
        message:
          type: string
    BusinessErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        reason:
          type: string
        retryable:
          type: boolean
        operatorActionRequired:
          type: boolean
    ContractType:
      type: string
      enum:
        - ENGINEERING
    PricingMode:
      type: string
      enum:
        - FIXED_TOTAL_PRICE
        - PROVISIONAL_TOTAL_PRICE
    PaymentMethod:
      type: string
      enum:
        - MONTHLY
        - MILESTONE
    InvoiceType:
      type: string
      enum:
        - VAT_GENERAL
        - VAT_SPECIAL
    PublicTaskStatus:
      type: string
      enum:
        - QUEUED
        - PROCESSING
        - SUCCESS
        - PARTIAL_SUCCESS
        - FAILED
    ExecutionStage:
      type: string
      enum:
        - CREATED
        - QUEUED
        - PARSING
        - INDEXING
        - PLANNING
        - BUILDING_EVIDENCE
        - REVIEWING_RULES
        - REVIEWING_MODEL
        - COMPOSING
        - SUCCESS
        - PARTIAL_SUCCESS
        - FAILED
        - CANCELLED
    PointStatus:
      type: string
      enum:
        - PASS
        - WARNING
        - ERROR
        - NOT_CONCLUDED
        - SKIPPED
    NotConcludedReason:
      type: string
      enum:
        - PARSE_LOW_CONFIDENCE
        - EVIDENCE_NOT_FOUND
        - EVIDENCE_AMBIGUOUS
        - MODEL_UNAVAILABLE
        - MODEL_BUDGET_EXCEEDED
        - INTERNAL_RULE_ERROR
    NotConcludedDetail:
      type: string
      description: >-
        optional / diagnostic-only compatibility enum。当前真实 DTO 可能尚未承载；
        不改变既有 notConcludedReason 的稳定语义，只用于补充诊断细节。
      enum:
        - INDEX_MISSING
        - ROLE_CONFLICT
        - PARSE_LOW_CONFIDENCE
        - BUDGET_TRUNCATED
    SnapshotStatus:
      type: string
      enum:
        - SUCCESS
        - PARTIAL_SUCCESS
    ReviewCoverageStatus:
      type: string
      enum:
        - FULL_REVIEWED
        - PARTIAL_REVIEWED
        - LOW_CONFIDENCE_REVIEW
    ConfidenceLevel:
      type: string
      enum:
        - HIGH
        - MEDIUM
        - LOW
    FindingSeverity:
      type: string
      nullable: true
      enum:
        - WARNING
        - ERROR
    ProviderType:
      type: string
      enum:
        - LOCAL
        - PUBLIC_OPENAI_COMPATIBLE
        - MOCK
    SupersededReason:
      type: string
      enum:
        - TYPE_CORRECTION
        - BUDGET_UPGRADE
        - MANUAL_RERUN
        - RULESET_RERUN
        - MODEL_UPGRADE
        - PARSER_UPGRADE
        - ADMIN_RECOVERY
